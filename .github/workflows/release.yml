name: Release

# Publish binaries when a version tag is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Install syft (for SBOMs)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: a PAT with contents:write on yedidiaSch/homebrew-tap enables
          # the Homebrew formula push. If unset, the release still succeeds and the
          # brew step is skipped (see skip_upload in .goreleaser.yaml).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
