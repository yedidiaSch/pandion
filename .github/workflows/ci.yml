name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race ./...

      - name: go build
        run: go build ./...

  # Validate the pure-Go core on macOS and Windows (M7): build, unit tests, AND an
  # offline CLI smoke that proves the binary RUNS on each host OS (config validation,
  # mock provisioning, dry-run, completion — path handling + state I/O). A full cloud
  # + overlay-join run from real Mac/Windows hardware is covered by scripts/mac_smoke.sh
  # (manual, once); this covers the automatable core on every push.
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      - name: offline CLI smoke
        shell: bash
        run: bash scripts/ci_smoke.sh
