name: Publish package repo

# Builds a SIGNED apt + yum repository from a release's .deb/.rpm artifacts and
# deploys it to GitHub Pages (served at https://<owner>.github.io/pandion/).
#
# Requires:
#   - secret GPG_PRIVATE_KEY  (armored private signing key; set already)
#   - the repo to be PUBLIC with Pages enabled (source: gh-pages branch)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)publish, e.g. v0.1.0"
        required: true
        default: v0.1.0

permissions:
  contents: write # push the gh-pages branch

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install repo tooling
        run: sudo apt-get update && sudo apt-get install -y reprepro createrepo-c

      - name: Import signing key
        id: gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          echo "fpr=$FPR" >> "$GITHUB_OUTPUT"
          echo "signing with $FPR"

      - name: Download release packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p pkgs
          gh release download "${{ steps.tag.outputs.tag }}" -R "$GITHUB_REPOSITORY" \
            -p '*.deb' -p '*.rpm' -D pkgs
          ls -1 pkgs

      - name: Build signed APT repo (reprepro)
        env:
          FPR: ${{ steps.gpg.outputs.fpr }}
        run: |
          mkdir -p aptrepo/conf site/deb
          cat > aptrepo/conf/distributions <<EOF
          Origin: Pandion
          Label: Pandion
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: Pandion apt repository
          SignWith: $FPR
          EOF
          for d in pkgs/*.deb; do reprepro -b aptrepo includedeb stable "$d"; done
          cp -r aptrepo/{dists,pool} site/deb/

      - name: Build signed YUM repo (createrepo_c)
        env:
          FPR: ${{ steps.gpg.outputs.fpr }}
        run: |
          mkdir -p site/rpm
          cp pkgs/*.rpm site/rpm/
          createrepo_c site/rpm
          gpg --batch --yes --detach-sign --armor -u "$FPR" site/rpm/repodata/repomd.xml

      - name: Assemble site (public key, .repo, landing page)
        run: |
          cp packaging/pandion-packages.gpg.key site/gpg.key
          cat > site/pandion.repo <<'EOF'
          [pandion]
          name=Pandion
          baseurl=https://yedidiaSch.github.io/pandion/rpm
          enabled=1
          repo_gpgcheck=1
          gpgcheck=0
          gpgkey=https://yedidiaSch.github.io/pandion/gpg.key
          EOF
          cat > site/index.html <<'EOF'
          <!doctype html><meta charset=utf-8><title>Pandion packages</title>
          <body style="font-family:system-ui;max-width:52rem;margin:3rem auto;padding:0 1rem;line-height:1.5">
          <h1>Pandion package repository</h1>
          <h2>Debian / Ubuntu</h2>
          <pre>curl -fsSL https://yedidiaSch.github.io/pandion/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/pandion.gpg
          echo "deb [signed-by=/usr/share/keyrings/pandion.gpg] https://yedidiaSch.github.io/pandion/deb stable main" | sudo tee /etc/apt/sources.list.d/pandion.list
          sudo apt update &amp;&amp; sudo apt install pandion</pre>
          <h2>RHEL / Fedora</h2>
          <pre>sudo curl -fsSL https://yedidiaSch.github.io/pandion/pandion.repo -o /etc/yum.repos.d/pandion.repo
          sudo dnf install pandion</pre>
          </body>
          EOF
          touch site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
