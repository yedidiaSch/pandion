# Pandion release configuration (goreleaser v2).
# Local check:   goreleaser check
# Local build:   goreleaser build --snapshot --clean
# Release:       push a tag `vX.Y.Z` -> GitHub Actions runs `goreleaser release`.
version: 2

project_name: pandion

before:
  hooks:
    - go mod tidy

builds:
  - id: pandion
    main: ./cmd/pandion
    binary: pandion
    env:
      - CGO_ENABLED=0 # pure Go: fully static, trivial cross-compile
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64 # uncommon target; skip
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}" # reproducible builds

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - README.md

# Linux packages (.deb / .rpm / .apk) attached to each GitHub Release. These need
# no external repo/token — download and `dpkg -i` / `rpm -i`. Hosting a signed APT
# repo (Cloudsmith/PPA) for `apt install pandion` is a separate, later step.
nfpms:
  - id: packages
    package_name: pandion
    vendor: Pandion
    homepage: "https://github.com/yedidiaSch/pandion"
    maintainer: "Pandion authors <noreply@github.com>"
    description: "Provision, harden & orchestrate C++/IPC dev & test environments"
    license: "Apache-2.0"
    formats: [deb, rpm, apk]
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"

# Software Bill of Materials per archive (promised in the security design).
# Requires `syft` on the runner (installed by the release workflow).
sboms:
  - artifacts: archive

# Keyless artifact signing via Sigstore / cosign — OIDC-based, NO private key to
# manage or leak. We sign checksums.txt (which already covers every artifact by
# SHA-256), so the release gains checksums.txt.sig + checksums.txt.pem. Requires
# `cosign` on the runner and `id-token: write` in the release workflow.
#
# Verify a downloaded release:
#   cosign verify-blob \
#     --certificate checksums.txt.pem \
#     --signature   checksums.txt.sig \
#     --certificate-identity-regexp '^https://github.com/yedidiaSch/pandion/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
#   sha256sum -c checksums.txt        # then the checksums vouch for each artifact
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes" # non-interactive; keyless is the cosign v2 default
    artifacts: checksum
    output: true # upload the .sig + .pem as release assets

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge remote-tracking branch"

release:
  draft: false
  prerelease: auto # -rc/-beta tags are marked pre-release automatically
  name_template: "Pandion {{ .Tag }}"

# Homebrew tap: publishes a cask to yedidiaSch/homebrew-tap so users can
# `brew install yedidiaSch/tap/pandion`. Pushing needs a PAT with contents:write
# on the tap repo, provided as HOMEBREW_TAP_GITHUB_TOKEN. If that secret is unset,
# skip_upload is true and the release still succeeds (cask just isn't pushed).
# (goreleaser v2 replaced `brews` with `homebrew_casks` for CLI binaries.)
homebrew_casks:
  - name: pandion
    repository:
      owner: yedidiaSch
      name: homebrew-tap
      branch: master
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/yedidiaSch/pandion"
    description: "Provision, harden & orchestrate C++/IPC dev environments"
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    # remove the macOS Gatekeeper quarantine on the unsigned binary at install
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/pandion"]
          end
